<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Mondal Family</title>
    
    <link rel="icon" type="image/x-icon" href="https://www.uddinmondal.in/favicon.ico">

    <style>
        /* Define custom font from the new absolute URL */
        @font-face {
            font-family: 'MyCustomFont';
            src: url('https://www.uddinmondal.in/font.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'MyCustomFont', sans-serif;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Remote Background Image from the new URL */
            background-image: url('https://www.uddinmondal.in/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.45); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 60px 40px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 90%;
            max-width: 550px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 42px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h2 {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            font-weight: normal;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        .instruction-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed rgba(255, 255, 255, 0.3);
        }

        .instruction-text {
            color: #ffffff;
            font-size: 20px;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Mondal Family</h1>
        <h2>This is The Family Domain of The Mondals'</h2>
        
        <div class="instruction-box">
            <p class="instruction-text">Add Desired Subdomain in the URL 🌐</p>
        </div>
    </div>

</body>
</html>
